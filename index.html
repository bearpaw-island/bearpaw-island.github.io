<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>熊爪小岛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:"Microsoft YaHei",sans-serif}
#game{width:375px;height:667px;position:relative;overflow:hidden;border-radius:14px;box-shadow:0 0 40px rgba(80,60,200,.3)}
.bg{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#0a0a2a 0%,#141435 30%,#1a1a3e 60%,#0f0f28 100%);z-index:0}
#top{z-index:10;position:absolute;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,rgba(30,20,50,.98),rgba(25,18,45,.95));display:flex;align-items:center;padding:0 10px;border-bottom:1px solid rgba(255,215,0,.15);gap:6px}
#gld,#gms{color:#ffd700;font-size:15px;font-weight:bold;text-shadow:0 0 8px rgba(255,215,0,.3)}
#gms{color:#6cf;font-size:13px}
#btlvl{font-size:11px;color:#888;margin-left:auto}
#rate{position:absolute;top:56px;left:0;right:0;text-align:center;color:#8a8;font-size:11px;z-index:10;background:rgba(10,10,42,.6)}
#scroll{z-index:5;position:absolute;top:74px;bottom:68px;left:0;right:0;overflow-y:auto;padding:6px 8px;scroll-behavior:smooth}
#scroll::-webkit-scrollbar{width:0}
#bottom{z-index:10;position:absolute;bottom:0;left:0;right:0;height:68px;background:linear-gradient(0deg,rgba(25,18,45,.98),rgba(30,20,50,.95));display:flex;justify-content:space-evenly;align-items:center;border-top:1px solid rgba(255,215,0,.15);flex-wrap:wrap;gap:1px;padding:2px 2px}
.bbtn{padding:5px 2px;border-radius:8px;font-size:9px;font-weight:bold;cursor:pointer;border:none;color:#fff;transition:transform .15s,filter .15s;flex:1;min-width:40px;line-height:1.2}
.bbtn:active{transform:scale(.92);filter:brightness(1.3)}
.bbtn.e{background:linear-gradient(135deg,#3a8,#2a6)}
.bbtn.c{background:linear-gradient(135deg,#48a,#369)}
.bbtn.d{background:linear-gradient(135deg,#a3a,#825)}
.bbtn.a{background:linear-gradient(135deg,#c84,#a63)}
.bbtn.s{background:linear-gradient(135deg,#c84,#a63)}
.bbtn.t{background:linear-gradient(135deg,#fc6,#c84)}
.bbtn.f{background:linear-gradient(135deg,#e55,#933)}
.bbtn.g{background:linear-gradient(135deg,#58b,#257)}
.bbtn.h{background:linear-gradient(135deg,#e8a,#713)}
.card{background:linear-gradient(135deg,rgba(45,35,70,.92),rgba(35,28,58,.92));border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;border:1px solid rgba(255,255,255,.05);transition:transform .2s,box-shadow .2s}
.card:active{transform:translateX(2px);box-shadow:0 2px 12px rgba(100,80,200,.15)}
.card.lv0 .name{color:#aaa}
.card .ico{font-size:26px;margin-right:8px;width:36px;text-align:center;filter:drop-shadow(0 0 4px rgba(255,200,50,.3));color-scheme:normal;font-family:'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif}
.card .info{flex:1}
.card .name{color:#ffd700;font-size:13px;font-weight:bold}
.card .level{color:#999;font-size:10px}
.card .rate{color:#8a8;font-size:9px}
.card .act{padding:6px 0;width:56px;border-radius:7px;font-size:10px;font-weight:bold;cursor:pointer;border:none;color:#fff;text-align:center}
.card .act:active{transform:scale(.93)}
.act.build{background:linear-gradient(135deg,#5a8,#3a6)}
.act.max{background:#333;color:#666;cursor:default}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);display:none;justify-content:center;align-items:center;z-index:100}
.overlay.show{display:flex}
.popup{background:linear-gradient(180deg,#2a2a4e,#222242);border-radius:16px;padding:22px 20px;text-align:center;max-width:290px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.5);border:1px solid rgba(255,215,0,.15);animation:popIn .25s ease-out}
@keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
.popup .pt{font-size:20px;color:#ffd700;margin-bottom:8px}
.popup .pd{color:#bbb;font-size:13px;margin-bottom:16px;white-space:pre-line;line-height:1.5}
.popup .pb{display:flex;gap:8px;justify-content:center}
.pbtn{padding:8px 24px;border-radius:10px;font-size:14px;font-weight:bold;border:none;color:#fff;cursor:pointer;transition:transform .15s}
.pbtn:active{transform:scale(.94)}
.pbtn.ok{background:linear-gradient(135deg,#5a8,#3a6)}
.pbtn.cancel{background:linear-gradient(135deg,#855,#633)}
.panel{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#0a0a2a,#141435);display:none;z-index:50;overflow-y:auto;padding:20px 12px}
.panel .ptitle{text-align:center;color:#ffd700;font-size:20px;font-weight:bold;margin-bottom:4px}
.panel .psub{text-align:center;color:#888;font-size:12px;margin-bottom:14px}
.pitem{background:rgba(40,30,65,.7);border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid rgba(255,255,255,.04)}
.pitem .pi{font-size:22px;margin-right:10px}
.pitem.flex{display:flex;align-items:center}
.pitem .ptx{flex:1}
.pitem .pn{font-size:14px;font-weight:bold}
.pitem .pd{font-size:10px;color:#777;margin-top:2px}
.pitem .pr{color:#c84;font-size:12px;font-weight:bold;min-width:50px;text-align:right}
.pitem.locked .pn{color:#555}
.pitem.found .pn{color:#ffd700}
.daily-bar{width:100%;height:5px;background:#333;border-radius:3px;margin-top:4px;overflow:hidden}
.daily-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4a8,#6cf);transition:width .3s}
.daily-done .pn{color:#8b8!important}
.shop-card{background:rgba(30,25,60,.95);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;align-items:center;border:1px solid rgba(255,215,0,.08)}
.shop-card .si{font-size:24px;margin-right:10px}
.shop-card .si2{flex:1}
.shop-card .sn{color:#ffd700;font-size:13px;font-weight:bold}
.shop-card .sd{color:#999;font-size:10px}
.shop-card .sbtn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:bold;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#c84,#a63)}
.shop-card .sbtn:active{transform:scale(.94)}
#mcard{background:linear-gradient(135deg,rgba(200,130,60,.2),rgba(160,100,40,.15));border:1px solid rgba(255,180,60,.3);border-radius:12px;padding:14px;margin-bottom:8px;text-align:center}
#mcard .mt{font-size:16px;color:#fc6;font-weight:bold}
#mcard .md{color:#bbb;font-size:11px;margin:4px 0}
#mcard .mb{color:#ffd700;font-size:22px;font-weight:bold;margin:6px 0}
#mcard .mbtn{padding:8px 24px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#c84,#a63)}
#mcard.active{border-color:rgba(100,200,100,.4);background:rgba(40,80,40,.2)}
#mcard.active .mt{color:#8b8}
#chest-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:200}
.ccont{text-align:center;animation:popIn .3s ease-out}
.cchest{font-size:70px;animation:bounce .6s ease-in-out infinite alternate}
@keyframes bounce{0%{transform:scale(1) translateY(0)}100%{transform:scale(1.1) translateY(-10px)}}
.cres{color:#ffd700;font-size:20px;font-weight:bold;margin:10px 0}
.cbtn{padding:10px 30px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#5a8,#3a6);margin-top:6px}
#offline{z-index:70;position:absolute;top:0;left:0;right:0;bottom:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.8)}
#offline .om{background:linear-gradient(180deg,#1a1a3e,#141435);border-radius:16px;padding:24px;text-align:center;max-width:270px;border:1px solid rgba(255,215,0,.2)}
#offline .ot{font-size:18px;color:#ffd700;margin-bottom:6px}
#offline .oe{font-size:28px;color:#ffd700;font-weight:bold;margin:10px 0}
#offline .obtn{padding:10px 30px;border-radius:10px;font-size:14px;font-weight:bold;border:none;cursor:pointer;margin:4px;color:#fff}
#offline .obtn.ok{background:linear-gradient(135deg,#5a8,#3a6)}
#offline .obtn.dbl{background:linear-gradient(135deg,#c84,#a63);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,130,60,.4)}50%{box-shadow:0 0 0 12px rgba(200,130,60,0)}}
/* 战斗面板 */
#battle-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;z-index:150;padding:20px}
#battle-ui{text-align:center;color:#fff}
#battle-ui .btitle{font-size:20px;color:#ff6347;font-weight:bold;margin-bottom:12px}
#battle-ui .bhp{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0}
#battle-ui .bhp-bar{width:200px;height:10px;background:#333;border-radius:5px;overflow:hidden}
#battle-ui .bhp-fill{height:100%;background:#e55;transition:width .3s}
#battle-ui .bhp-fill.me{background:#4a8}
#battle-ui .blog{max-height:200px;overflow-y:auto;font-size:12px;color:#aaa;margin:12px 0;text-align:left;padding:8px;background:rgba(0,0,0,.3);border-radius:8px}
#battle-ui .bbtn-area{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#battle-ui .btla{font-size:12px;color:#888}
/* 小游戏 */
#minigame-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;z-index:150;padding:20px}
#mg-ui{text-align:center;color:#fff;height:100%;display:flex;flex-direction:column;justify-content:center}
#mg-ui .mgtitle{font-size:22px;color:#ffd700;font-weight:bold;margin-bottom:8px}
#mg-ui .mginfo{color:#aaa;font-size:13px;margin-bottom:16px}
#mg-ui .mg-area{flex:1;position:relative;background:rgba(0,0,0,.3);border-radius:16px;margin:10px 0;overflow:hidden}
#mg-ui .mg-hit{position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(255,215,0,.3);border:2px solid #ffd700;cursor:pointer;transition:transform .1s;animation:mgPop .8s ease-out forwards}
#mg-ui .mg-hit.fast{animation:mgPop .5s ease-out forwards}
#mg-ui .mg-hit:active{transform:scale(1.3);background:rgba(255,100,0,.5)}
@keyframes mgPop{0%{transform:scale(0)}80%{transform:scale(1)}100%{transform:scale(0)}}
#mg-ui .mg-score{font-size:32px;color:#ffd700;font-weight:bold;margin:8px 0}
#mg-ui .mg-timer{color:#e55;font-size:18px;font-weight:bold}
/* 钓鱼 */
#fish-area{height:150px;position:relative;background:linear-gradient(180deg,#1a3a5a,#0a2a4a);border-radius:12px;margin:10px 0}
#fish-area .fish-target{position:absolute;width:40px;height:40px;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><text y="30" font-size="30">🎣</text></svg>') center/contain;left:50%;transform:translateX(-50%);transition:top .3s}
#fish-area .fish-zone{position:absolute;width:80px;height:4px;background:#6cf;left:50%;transform:translateX(-50%);border-radius:2px;transition:top .2s}
#fish-area .fish-result{text-align:center;color:#ffd700;font-size:14px;font-weight:bold}
/* 事件通知 */
#evpop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(180deg,#333,#222);border:2px solid #ffd700;border-radius:16px;padding:20px;text-align:center;color:#fff;z-index:90;display:none;width:280px;animation:popIn .3s ease-out;box-shadow:0 0 30px rgba(255,200,0,.2)}
#evpop .evicon{font-size:50px;margin-bottom:8px}
#evpop .evtitle{font-size:18px;color:#ffd700;font-weight:bold;margin-bottom:6px}
#evpop .evdesc{font-size:12px;color:#bbb;margin-bottom:14px;line-height:1.5}
#evpop .evbtn{padding:10px 30px;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#5a8,#3a6)}
/* 合成 */
.recipe-item{background:rgba(40,30,65,.7);border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center}
.recipe-item .ri{font-size:24px;margin-right:10px}
.recipe-item .rtx{flex:1}
.recipe-item .rn{color:#ffd700;font-size:13px;font-weight:bold}
.recipe-item .rd{color:#888;font-size:10px}
.recipe-item .rbtn{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:bold;cursor:pointer;border:none;color:#fff;background:linear-gradient(135deg,#a6c,#84a)}
.rbtn.disabled{background:#333;color:#666;cursor:not-allowed}
/* 排行榜 */
.lb-item{background:rgba(30,25,60,.85);border-radius:8px;padding:10px 14px;margin-bottom:4px;display:flex;align-items:center}
.lb-rank{font-size:18px;color:#ffd700;width:30px;font-weight:bold}
.lb-name{flex:1;font-size:14px;color:#ddd}
.lb-gold{font-size:12px;color:#fc6}
.fly{position:absolute;left:50%;transform:translateX(-50%);color:#ffd700;font-size:16px;font-weight:bold;pointer-events:none;animation:flyUp 1.2s forwards;z-index:200}
@keyframes flyUp{0%{opacity:1;bottom:180px}100%{opacity:0;bottom:320px}}
/* 页面指示器 */
.tabs{display:flex;gap:2px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(40,30,65,.5);color:#888}
.tab.active{background:rgba(100,80,180,.4);color:#ffd700;border-color:rgba(255,215,0,.3)}
</style>
</head>
<body>
<div id="game">
  <div class="bg"></div>
  <div id="top"><span id="gld">💰 100</span><span id="gms">💠 5</span><span id="btlvl"></span></div>
  <div id="rate">💰 0/s</div>

<script src="data.js"></script><script>
// ==================== 存档系统 ====================
let S=JSON.parse(localStorage.getItem('xzd4')||'{"gold":100,"gems":5,"lvs":{},"found":[],"ach":[],"last":0,"daily":{},"today":"","adx2":0,"cardEnd":0,"noads":false,"pets":[],"kills":0,"synth":0,"eventCd":0,"boostEnd":0,"minigame_rec":0,"fish_rec":0}');
if(!S.last)S.last=Date.now();S.lvs=S.lvs||{};S.found=S.found||[];S.ach=S.ach||[];S.daily=S.daily||{};S.adx2=S.adx2||0;S.cardEnd=S.cardEnd||0;S.noads=S.noads||false;S.pets=S.pets||[];S.kills=S.kills||0;S.synth=S.synth||0;S.eventCd=S.eventCd||0;S.boostEnd=S.boostEnd||0;S.minigame_rec=S.minigame_rec||0;S.fish_rec=S.fish_rec||0;
BD.forEach(b=>{if(!(b.id in S.lvs))S.lvs[b.id]=0});
const today=new Date().toDateString();
if(S.today!==today){S.today=today;S.daily={};S.adx2=0;}
DAILY.forEach(d=>{if(!(d.id in S.daily))S.daily[d.id]=0});

// ==================== 音频系统 ====================
let ac=null;
function initAudio(){if(ac)return;try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function play(f,hz,dur,type,gain){gain=gain||0.08;type=type||'sine';if(!ac)initAudio();if(!ac)return;try{let o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.setValueAtTime(hz,ac.currentTime);if(f)o.frequency.exponentialRampToValueAtTime(f,ac.currentTime+dur);g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);}catch(e){}}
function sfxClick(){play(0,600,0.08,'sine',0.06);setTimeout(function(){play(0,800,0.06,'sine',0.04)},80);}
function sfxBuild(){play(0,180,0.15,'triangle',0.1);setTimeout(function(){play(0,360,0.12,'triangle',0.08)},100);setTimeout(function(){play(0,540,0.1,'sine',0.07)},200);}
function sfxExplore(){play(0,800,0.1,'sine',0.05);setTimeout(function(){play(0,1200,0.08,'sine',0.04)},80);setTimeout(function(){play(0,1600,0.06,'sine',0.03)},160);}
function sfxGold(){play(0,1200,0.06,'triangle',0.05);setTimeout(function(){play(0,1600,0.04,'triangle',0.04)},50);setTimeout(function(){play(0,2000,0.04,'triangle',0.03)},100);}
function sfxHit(){play(0,200,0.1,'square',0.08);}
function sfxWin(){play(0,500,0.15,'sine',0.06);setTimeout(function(){play(0,800,0.12,'sine',0.05)},100);setTimeout(function(){play(0,1200,0.1,'sine',0.04)},250);}

// ==================== 工具函数 ====================
function save(){S.last=Date.now();localStorage.setItem('xzd4',JSON.stringify(S));}
function fmt(n){return n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.floor(n).toString();}
function getIncome(){let t=0;BD.forEach(b=>{let l=S.lvs[b.id]||0;if(l>0)t+=b.bi+b.ig*(lv-1)*(lv>0?1:0);});return Math.round(t);}
function realIncome(){let t=0;BD.forEach(b=>{let lv=S.lvs[b.id]||0;if(lv>0)t+=b.bi+b.ig*(lv-1);});if(S.boostEnd&&Date.now()<S.boostEnd)t*=2;return Math.round(t);}
function cost(id){let b=BD.find(x=>x.id===id);let lv=S.lvs[id]||0;return Math.floor(b.bc+b.cg*lv*Math.pow(1.05,lv));}
function totalLv(){let t=0;BD.forEach(b=>t+=S.lvs[b.id]||0);return t;}
function fmtTime(s){if(s<60)return Math.floor(s)+'秒';if(s<3600)return Math.floor(s/60)+'分钟';return Math.floor(s/3600)+'小时'+Math.floor(s/60%60)+'分';}
function playerAtk(){let a=totalLv()*2+1;S.pets.forEach(pid=>{let p=PETS.find(x=>x.id===pid);if(p)a+=p.atk;});return a;}
function playerHp(){return 50+totalLv()*5;}

  let ws=av.map(i=>({i:i,w:100/i.r})),tw=ws.reduce(function(s,x){return s+x.w},0),r=Math.random()*tw;

    return '<div class="pitem flex'+(done?' found':'')+'"><div class="pi">'+a.icon+'</div><div class="ptx"><div class="pn">'+a.n+'</div><div class="pd">'+a.d+'</div></div><div class="pr">'+(done?'✅ 已达成':ok?'🔓 可领取':'🔒')+'</div></div>';
  }).join('');

function aCheck(a){
  if(a.id==='a1')return Object.values(S.lvs).some(v=>v>0);
  if(a.id==='a2')return S.gold>=1000;
  if(a.id==='a3')return totalLv()>=20;
  if(a.id==='a4')return S.found.length>=5;
  if(a.id==='a5')return S.gold>=1e6;
  if(a.id==='a6')return S.found.length>=12;
  if(a.id==='a7')return (S.lvs['dragon']||0)>0;
  if(a.id==='a8')return (S.lvs['castle']||0)>0;
  if(a.id==='a9')return (S.kills||0)>=5;
  if(a.id==='a10')return (S.synth||0)>=10;
  if(a.id==='a11')return S.pets.length>=3;
  if(a.id==='a12')return S.gold>=1e7;
  return false;
}
function checkAch(){
  let changed=false;
  ACH.forEach(a=>{if(!S.ach.includes(a.id)&&aCheck(a)){S.ach.push(a.id);changed=true;sfxGold();flyText('🏆 '+a.n+' 达成！');}});
  if(changed)save();
}

let battleActive=false, battleEnemy=null, battleEhp=0, battleLog=[];
function selectEnemy(){
  let tl=totalLv(),avail=ENEMIES.filter(e=>e.lv<=tl+5);
  if(avail.length===0)return ENEMIES[0];
  return avail[Math.floor(Math.random()*avail.length)];
}
function startBattle(){
  let e=selectEnemy();battleActive=true;battleEnemy=e;battleEhp=e.hp;battleLog=['⚔️ 遭遇了 '+e.n+'！'];
  renderBattle();
  document.getElementById('battle-overlay').style.display='block';
  document.getElementById('scroll').style.display='none';
  initAudio();
}
function renderBattle(){
  let hp=playerHp(),ehp=battleEhp,bhp=maxHp(),behp=battleEnemy.hp;
  let hpPct=Math.max(0,Math.floor(ehp/Math.max(1,behp)*100));
  document.getElementById('battle-ui').innerHTML=
    '<div class="btitle">⚔️ 对战 '+battleEnemy.n+'</div>'+
    '<div style="font-size:30px">'+battleEnemy.icon+'</div>'+
    '<div class="bhp"><span>你</span><div class="bhp-bar"><div class="bhp-fill me" style="width:'+hpPct+'%"></div></div><span>'+ehp+'/'+bhp+'</span></div>'+
    '<div class="blog">'+battleLog.map(l=>'<div>'+l+'</div>').join('')+'</div>'+
    '<div class="bbtn-area"><button class="pbtn ok attack-btn">⚔️ 攻击</button><button class="pbtn cancel flee-btn">🏃 逃跑</button></div>'+
    '<div class="btla">⚡ 攻击力: '+playerAtk()+' | ⚔️ 胜场: '+(S.kills||0)+'</div>';
}
function maxHp(){return playerHp();}
function battleAttack(){
  if(!battleActive)return;
  let dmg=Math.floor(playerAtk()*(0.8+Math.random()*0.4));
  battleEhp-=dmg;battleLog.push('🗡️ 你对 '+battleEnemy.n+' 造成 '+dmg+' 伤害！');
  sfxHit();
  if(battleEhp<=0){
    battleActive=false;S.kills=(S.kills||0)+1;
    let g=battleEnemy.gold;S.gold+=g;
    trackDaily('d5');save();updateUI();sfxWin();
    document.getElementById('battle-ui').innerHTML=
      '<div class="btitle" style="color:#ffd700">🎉 胜利！</div>'+
      '<div style="font-size:30px">'+battleEnemy.icon+'</div>'+
      '<div style="color:#ffd700;font-size:18px;margin:12px 0">+'+fmt(g)+' 💰</div>'+
      '<div style="color:#aaa;font-size:12px">击败了 '+battleEnemy.n+'</div>'+
      '<div class="blog">'+battleLog.map(l=>'<div>'+l+'</div>').join('')+'</div>'+
      '<div style="margin-top:12px"><button class="pbtn ok" id="battle-close">继续</button></div>';
    return;
  }
  // 敌人反击
  setTimeout(function(){
    if(!battleActive)return;
    let edmg=Math.floor(battleEnemy.atk*(0.7+Math.random()*0.6));
    let php=playerHp()-edmg;
    let lose=edmg>=playerHp()||Math.random()<0.05;
    if(lose){
      battleActive=false;S.gold=Math.floor(S.gold*0.9);
      battleLog.push('💔 '+battleEnemy.n+' 造成 '+edmg+' 致命伤害！你逃跑了... 损失10%金币');
      save();updateUI();
      document.getElementById('battle-ui').innerHTML=
        '<div class="btitle" style="color:#e55">💔 战败</div>'+
        '<div style="font-size:30px">'+battleEnemy.icon+'</div>'+
        '<div style="color:#e55;font-size:16px;margin:12px 0">损失了 10% 金币...</div>'+
        '<div class="blog">'+battleLog.map(l=>'<div>'+l+'</div>').join('')+'</div>'+
        '<div style="margin-top:12px"><button class="pbtn cancel" id="battle-close">😢 撤退</button></div>';
    }else{
      battleLog.push('💢 '+battleEnemy.n+' 反击造成 '+edmg+' 伤害！');
      renderBattle();
    }
  },600);
}
function closeBattle(){
  document.getElementById('battle-overlay').style.display='none';
  document.getElementById('scroll').style.display='';
  battleActive=false;flyText('⚔️ 胜场: '+(S.kills||0));
}

function checkEvent(){
  if(Date.now()<S.eventCd)return;
  let ev=EVENTS[Math.floor(Math.random()*EVENTS.length)],amt=Math.floor(Math.max(realIncome(),10)*3600*(0.5+Math.random()));

  icon.textContent=ev.icon;title.textContent=ev.n;
  let descText=ev.d.replace('{amt}',fmt(amt));
  desc.textContent=descText;
  evpop.style.display='block';
  btn.onclick=function(){
    evpop.style.display='none';
    if(ev.g==='gold'){S.gold+=amt;sfxGold();flyText('💰 +'+fmt(amt));}
    else if(ev.g==='lose'){S.gold=Math.max(0,S.gold-amt);flyText('💸 -'+fmt(amt));play(0,80,0.2,'square',0.06);}
    else if(ev.g==='gem'){S.gems+=3;sfxGold();flyText('💠 +3');}
    else if(ev.g==='boost'){S.boostEnd=Date.now()+30000;flyText('⚡ 30秒双倍！');}
    save();updateUI();
  };
}

  ui.innerHTML='<div class="mgtitle">🎮 小游戏</div>'+
    '<div class="mginfo">选一个玩玩吧！</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin:20px 0">'+
    '<button class="pbtn ok" style="width:100%" id="mg-clicker">🎯 快速点击（最佳:'+(S.minigame_rec||0)+'）</button>'+
    '<button class="pbtn ok" style="width:100%" id="mg-fish">🎣 钓鱼（最佳:'+(S.fish_rec||0)+'）</button>'+
    '</div>'+
    '<button class="pbtn cancel" id="mg-quit">退出</button>';
}
function endMinigame(){
  mgActive=false;clearInterval(mgInterval);
  let reward=0;
  if(mgType==='clicker'){trackDaily('d7');reward=mgScore*Math.max(realIncome(),10)*5;S.minigame_rec=Math.max(S.minigame_rec||0,mgScore);}
  else if(mgType==='fish'){reward=mgScore*Math.max(realIncome(),10)*10;}
  S.gold+=reward;save();updateUI();sfxGold();
  let ui=document.getElementById('mg-ui');
  ui.innerHTML='<div class="mgtitle">🎉 游戏结束！</div>'+
    '<div class="mg-score">'+mgScore+'</div>'+
    '<div style="color:#ffd700;font-size:16px">+'+fmt(reward)+' 💰</div>'+
    '<div style="margin-top:16px"><button class="pbtn ok" id="mg-close">继续</button></div>';
}
function closeMinigame(){
  mgActive=false;clearInterval(mgInterval);
  document.getElementById('minigame-overlay').style.display='none';
  document.getElementById('scroll').style.display='';
  S.minigame_rec=S.minigame_rec||0;S.fish_rec=S.fish_rec||0;
}

// ==================== 合成系统 ====================
let synOpen=false;
function toggleSyn(){synOpen=!synOpen;document.getElementById('synpanel').style.display=synOpen?'block':'none';document.getElementById('scroll').style.display=synOpen?'none':'';if(synOpen)renderSyn();}
function canSynth(r){
  for(let fid of r.from){
    let count=r.from.filter(x=>x===fid).length;
    let have=S.found.filter(x=>x===fid).length;
    if(have<count)return false;
  }
  return true;
}
function doSynth(rid){
  let r=RECIPES.find(x=>x.id===rid);if(!r||!canSynth(r))return;
  for(let fid of r.from){let idx=S.found.indexOf(fid);if(idx>-1)S.found.splice(idx,1);}
  S.found.push(r.to);S.synth=(S.synth||0)+1;trackDaily('d6');
  save();sfxBuild();flyText('🔮 合成 '+r.n+'！');renderSyn();updateUI();
}
function renderSyn(){
  document.getElementById('slist').innerHTML=RECIPES.map(r=>{
    let ok=canSynth(r);
    return '<div class="recipe-item"><div class="ri">'+r.icon+'</div><div class="rtx"><div class="rn">'+r.n+'</div><div class="rd">'+r.desc+' (需要: '+r.from.map(f=>IT.find(i=>i.id===f).n.substring(0,3)).join('+')+')</div></div><button class="rbtn'+(ok?'':' disabled')+'" '+(ok?'data-syn="'+r.id+'"':'disabled')+'>合成</button></div>';
  }).join('');
}

// ==================== 伙伴系统 ====================
let petOpen=false;
function togglePet(){petOpen=!petOpen;document.getElementById('petpanel').style.display=petOpen?'block':'none';document.getElementById('scroll').style.display=petOpen?'none':'';if(petOpen)renderPet();}
function renderPet(){
  document.getElementById('petpow').textContent=playerAtk();
  document.getElementById('petlist').innerHTML=PETS.map(p=>{
    let owned=S.pets.includes(p.id);
    return '<div class="pitem flex'+(owned?' found':'')+'"><div class="pi">'+p.icon+'</div><div class="ptx"><div class="pn">'+p.n+' (ATK +'+p.atk+')</div><div class="pd">'+p.desc+'</div></div><div class="pr">'+(owned?'✅ 已拥有':'💰 '+fmt(p.cost)+(owned?'':'<button class="rbtn" style="margin-top:4px" data-buy-pet="'+p.id+'">招募</button>'))+'</div></div>';
  }).join('');
}
function buyPet(id){
  let p=PETS.find(x=>x.id===id);if(!p)return;
  if(S.pets.includes(id)){flyText('🐾 已拥有 '+p.n);return;}
  if(S.gold<p.cost){flyText('💰 金币不足！');return;}
  S.gold-=p.cost;S.pets.push(id);save();sfxGold();
  flyText('🐾 '+p.n+' 加入了队伍！');
  trackDaily('d11');renderPet();updateUI();
}

// ==================== 排行榜 ====================
let lbOpen=false;
function toggleLB(){lbOpen=!lbOpen;document.getElementById('lbpanel').style.display=lbOpen?'block':'none';document.getElementById('scroll').style.display=lbOpen?'none':'';if(lbOpen)renderLB();}
function renderLB(){
  let items=[{name:'你',gold:S.gold}].concat(LEADERBOARD);
  items.sort((a,b)=>b.gold-a.gold);
  document.getElementById('lblist').innerHTML=items.map((l,i)=>{
    let rank=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return '<div class="lb-item"><span class="lb-rank">'+rank+'</span><span class="lb-name">'+l.name+'</span><span class="lb-gold">💰 '+fmt(l.gold)+'</span></div>';
  }).join('');
}

// ==================== 事件代理 ====================
document.getElementById('game').addEventListener('click',function(e){
  let t=e.target;
  if(t.classList.contains('build')){let id=t.dataset.bld;curBld=id;isExplore=false;sfxClick();showBldPopup(id);return;}
  if(t.id==='pok'){if(isExplore){hidePopup();return;}if(!curBld||doBuild(curBld)){hidePopup();}sfxClick();return;}
  if(t.id==='pca'){hidePopup();sfxClick();return;}
  if(t.id==='btexp'){doExplore();return;}
  if(t.id==='btbat'){startBattle();return;}
  if(t.id==='btplay'){selectMinigame();return;}
  if(t.id==='btsyn'){sfxClick();toggleSyn();return;}
  if(t.id==='btcol'){sfxClick();toggleCol();return;}
  if(t.id==='btach'){sfxClick();toggleAch();return;}
  if(t.id==='btad'){doAd();return;}
  if(t.id==='btshop'){sfxClick();toggleShop();return;}
  if(t.id==='btdaily'){sfxClick();toggleDaily();return;}
  if(t.id==='ccb'){toggleCol();return;}
  if(t.id==='acb'){toggleAch();return;}
  if(t.id==='scb'){toggleShop();return;}
  if(t.id==='dcb'){toggleDaily();return;}
  if(t.id==='snb'){toggleSyn();return;}
  if(t.id==='peb'){togglePet();return;}
  if(t.id==='lbb'){toggleLB();return;}
  if(t.classList.contains('sbtn')){buyShop(t.dataset.shop);return;}
  if(t.id==='chestClose'){claimChest();return;}
  if(t.id==='chestSkip'){claimChestSkip();return;}
  if(t.id==='oc1'){claimOffline();return;}
  if(t.id==='oc2'){claimOfflineDouble();return;}
  if(t.id==='battle-close'){closeBattle();return;}
  if(t.classList.contains('attack-btn')){battleAttack();return;}
  if(t.classList.contains('flee-btn')){closeBattle();sfxClick();flyText('🏃 逃跑了...');return;}
  if(t.id==='mg-quit'||t.id==='mg-close'){closeMinigame();return;}
  if(t.id==='mgquit'){closeMinigame();return;}
  if(t.id==='mg-clicker'){startMinigame('clicker');return;}
  if(t.id==='mg-fish'){startMinigame('fish');return;}
  if(t.id==='mgcast'){castFish();return;}
  if(t.dataset.syn){doSynth(t.dataset.syn);return;}
  if(t.dataset.buyPet){buyPet(t.dataset.buyPet);return;}
  if(t.id==='btpet'||(t.parentElement&&t.parentElement.id==='btpet')){sfxClick();togglePet();return;}
  if(t.id==='btlb'||(t.parentElement&&t.parentElement.id==='btlb')){sfxClick();toggleLB();return;}
});
document.getElementById('ol').addEventListener('click',function(e){if(e.target===this)hidePopup();});

// ==================== 初始化 ====================
updateUI();
setInterval(function(){
  S.gold+=realIncome();
  save();
  document.getElementById('gld').textContent='💰 '+fmt(S.gold);
  if(realIncome()>=500)trackDaily('d3');
  if(!battleActive&&!mgActive&&!colOpen&&!achOpen&&!shopOpen&&!dailyOpen&&!synOpen&&!petOpen&&!lbOpen){
    if(Math.random()<0.02)checkEvent();
  }
},1000);

// ==================== 月度检查 ====================
if((S.cardEnd||0)>Date.now()){
  let today=new Date().getDate();
  if(S.cardDay!==today){S.gems+=3;S.gold+=100000;S.cardDay=today;save();sfxGold();}
}

// 底部新增伙伴和排行按钮
let bottomEl=document.getElementById('bottom');
bottomEl.innerHTML=bottomEl.innerHTML.replace('</div>','')+'';

console.log('熊爪小岛 V4 🎉 战斗|随机事件|小游戏|合成|伙伴|排行榜');
</script>
</body>
